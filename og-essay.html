<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;}
  .card{width:1200px;height:630px;background:#f4f1ea;color:#1b1a17;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;position:relative;overflow:hidden;
    padding:72px 80px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;}
  .top{font-family:ui-monospace,Menlo,monospace;font-size:22px;letter-spacing:.18em;
    text-transform:uppercase;color:#8c8678;}
  .top .n{color:#d6440e;}
  .rule{height:5px;width:120px;background:#d6440e;margin:0 0 26px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:62px;line-height:1.08;
    letter-spacing:-0.015em;margin:0;}
  h1 em{font-style:italic;color:#d6440e;}
  .who{font-size:28px;color:#56524a;margin:0 0 6px;}
  .who b{color:#1b1a17;font-weight:600;}
  .url{font-family:ui-monospace,Menlo,monospace;font-size:22px;color:#1b1a17;}
  .glow{position:absolute;bottom:-200px;left:-140px;width:580px;height:580px;border-radius:50%;
    background:radial-gradient(circle,rgba(214,68,14,.09),transparent 68%);}
</style></head>
<body><div class="card">
  <div class="glow"></div>
  <div class="top"><span class="n">Essay</span> · sumanthkm.com/writing</div>
  <div>
    <div class="rule"></div>
    <h1>Designing a multi-agent code reviewer —<br>and <em>measuring it honestly</em>.</h1>
  </div>
  <div>
    <p class="who"><b>Sumanth Kumar M</b> · AI / Agent Engineer</p>
    <p class="url">routing · structured output · the eval mistake that fooled me</p>
  </div>
</div></body></html>
