<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;}
  /* LinkedIn banner = 1584x396. Content centered so it clears the avatar (lower-left)
     and survives mobile center-crop. */
  .card{width:1584px;height:396px;background:#f4f1ea;color:#1b1a17;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:18px;letter-spacing:.26em;
    text-transform:uppercase;color:#8c8678;margin-bottom:14px;}
  .rule{height:4px;width:90px;background:#d6440e;margin:0 auto 18px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:54px;line-height:1.0;
    letter-spacing:-0.02em;margin:0 0 16px;}
  h1 em{font-style:italic;color:#d6440e;}
  .sub{font-family:ui-monospace,Menlo,monospace;font-size:18px;color:#1b1a17;letter-spacing:.02em;}
  .glow{position:absolute;top:-160px;right:-80px;width:480px;height:480px;border-radius:50%;
    background:radial-gradient(circle,rgba(214,68,14,.10),transparent 68%);}
  .glow2{position:absolute;bottom:-200px;left:-120px;width:480px;height:480px;border-radius:50%;
    background:radial-gradient(circle,rgba(214,68,14,.06),transparent 68%);}
</style></head>
<body><div class="card">
  <div class="glow"></div><div class="glow2"></div>
  <div class="eyebrow">Senior Mobile Engineer · Remote</div>
  <div class="rule"></div>
  <h1>I build <em>mobile apps</em> — with real AI inside.</h1>
  <div class="sub">Android · Flutter · React Native · on-device LLMs · RAG · sumanthkm.com</div>
</div></body></html>
